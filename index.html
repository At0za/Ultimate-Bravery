<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Bravery - Modern Shards</title>
    <style>
        :root {
            --precision: #c8aa6e; --domination: #d0021b; --sorcery: #6c75ff;
            --resolve: #a1d586; --inspiration: #48b4be; --background: #010a13;
            --card-bg: #091428; --text: #f0e6d2; --gold: #c89b3c;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--background); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; background: var(--card-bg); border: 2px solid var(--gold); padding: 25px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); display: grid; grid-template-columns: 1fr; gap: 10px; }
        h1 { text-align: center; color: var(--gold); margin-top: 0; text-transform: uppercase; letter-spacing: 2px; grid-column: 1 / -1;}
        
        .role-selector { display: flex; justify-content: center; margin-bottom: 25px; gap: 15px; grid-column: 1 / -1; }
        .role-btn { padding: 12px 25px; background: #1e2328; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; transition: all 0.2s ease; font-weight: bold; font-size: 0.9rem; text-transform: uppercase; }
        .role-btn:hover { background: var(--gold); color: var(--background); }
        
        .result-section { display: none; grid-column: 1 / -1; border-top: 1px solid #3c3c41; padding-top: 25px; grid-template-columns: 1fr 1fr; gap: 30px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .left-column { grid-column: 1; text-align: left; }
        .right-column { grid-column: 2; text-align: left; }
        .result-item { margin-bottom: 20px; }
        
        .label { font-size: 0.75rem; font-weight: bold; color: var(--gold); display: block; margin-bottom: 5px; text-transform: uppercase; opacity: 0.8; }
        
        /* Icon Styling */
        .icon-inline { width: 24px; height: 24px; vertical-align: middle; margin-right: 8px; border-radius: 4px; border: 1px solid rgba(200, 155, 60, 0.3); }
        .icon-large { width: 64px; height: 64px; border: 2px solid var(--gold); border-radius: 4px; margin-right: 15px; float: left; }
        .champ-container { overflow: hidden; display: flex; align-items: center; }

        .Precision { color: var(--precision); } .Domination { color: var(--domination); } .Sorcery { color: var(--sorcery); } .Resolve { color: var(--resolve); } .Inspiration { color: var(--inspiration); }
        .build-list { list-style: none; padding: 0; margin: 0; }
        .build-list li { padding: 7px 0; border-bottom: 1px solid #1e2328; font-size: 1rem; display: flex; align-items: center; }
        .minor-runes { font-size: 0.85rem; color: #fff; margin-left: 10px; opacity: 0.9; }
        .stat-nodes { font-size: 0.85rem; color: #a0a0a0; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>Ultimate Bravery</h1>
    <div class="role-selector">
        <button class="role-btn" onclick="generate('TOP')">TOP</button>
        <button class="role-btn" onclick="generate('JG')">JG</button>
        <button class="role-btn" onclick="generate('MID')">MID</button>
        <button class="role-btn" onclick="generate('ADC')">ADC</button>
        <button class="role-btn" onclick="generate('SUPP')">SUPP</button>
    </div>

    <div id="results" class="result-section">
        <div class="left-column">
            <div class="result-item">
                <span class="label">Champion</span>
                <div class="champ-container">
                    <img id="img-champ" class="icon-large" src="" alt="">
                    <span id="res-champ" style="font-size: 1.8rem; font-weight: bold; color: #fff;"></span>
                </div>
            </div>
            <div class="result-item">
                <span class="label">Summoner Spells</span>
                <div id="res-summs" style="display: flex; gap: 10px; align-items: center;"></div>
            </div>
            <div class="result-item">
                <span class="label">Rune Page</span>
                <div id="res-runes"></div>
            </div>
        </div>
        <div class="right-column">
            <div class="result-item">
                <span class="label">Item Build</span>
                <ul id="res-items" class="build-list"></ul>
            </div>
        </div>
    </div>
</div>

<script>
    // Data Dragon version for images - update this to the latest LoL patch if icons go missing
    const VERSION = "14.5.1"; 

    // Mapping Item Names to their specific IDs for icons
    const itemToId = {
        // --- 2026 / NEW LEGENDARIES ---
        "Actualizer": "2522", "Bandlepipes": "2524", "Bastionbreaker": "2520", 
        "Diadem of Songs": "2530", "Dusk and Dawn": "2510", "Endless Hunger": "2517", 
        "Fiendhunter Bolts": "2512", "Hexoptics C44": "2523", "Protoplasm Harness": "2525", 
        "Hextech Gunblade": "3146", "Stormrazor": "3097", "Overlord's Bloodmail": "2501",
        "Yun Tal Wildarrows": "3032",

        // --- STARTERS & BOOTS ---
        "Doran's Blade": "1055", "Doran's Ring": "1056", "Doran's Shield": "1054",
        "Dark Seal": "1082", "Cull": "1083", "Tear of the Goddess": "3070",
        "World Atlas": "3865", "Gustwalker Hatchling": "1102", 
        "Mosstomper Seedling": "1103", "Scorchclaw Pup": "1101",
        "Berserker's Greaves": "3006", "Ionian Boots of Lucidity": "3158", 
        "Mercury's Treads": "3111", "Plated Steelcaps": "3047", 
        "Sorcerer's Shoes": "3020", "Swiftness Boots": "3009", "Symbiotic Soles": "3010",

        // --- SUPPORT FINALS ---
        "Celestial Opposition": "3869", "Dream Maker": "3870", 
        "Zaz'Zak's Realmspike": "3871", "Bloodsong": "3877", "Sleigh of Hand": "3876",

        // --- MAGE & AP ---
        "Rabadon's Deathcap": "3089", "Zhonya's Hourglass": "3157", "Banshee's Veil": "3102",
        "Liandry's Torment": "6653", "Blackfire Torch": "2503", "Ludens Companion": "3280", 
        "Archangel's Staff": "3003", "Malignance": "3118", "Shadowflame": "4645", 
        "Stormsurge": "4646", "Cryptbloom": "3137", "Void Staff": "3135", 
        "Nashor's Tooth": "3115", "Lich Bane": "3100", "Cosmic Drive": "4629", 
        "Morellonomicon": "3165", "Rylai's Crystal Scepter": "3116",

        // --- AD & ASSASSIN ---
        "Infinity Edge": "3031", "The Collector": "6676", "Lord Dominik's Regards": "3036", 
        "Mortal Reminder": "3033", "Kraken Slayer": "6672", "Navori Flickerblade": "6675", 
        "Phantom Dancer": "3046", "Statikk Shiv": "3087", "Rapid Firecannon": "3094", 
        "Blade of the Ruined King": "3153", "Terminus": "3302", "Wit's End": "3091", 
        "Guinsoo's Rageblade": "3124", "Immortal Shieldbow": "6673", "Bloodthirster": "3072", 
        "Essence Reaver": "3508", "Youmuu's Ghostblade": "3142", "Hubris": "6697", 
        "Opportunity": "6701", "Axiom Arc": "6696", "Edge of Night": "3814", 
        "Serylda's Grudge": "6694", "Umbral Glaive": "3179", "Profane Hydra": "6698", 
        "Voltaic Cyclosword": "6699",

        // --- TANK & FIGHTER ---
        "Heartsteel": "3084", "Warmog's Armor": "3083", "Thornmail": "3075", 
        "Sunfire Aegis": "3068", "Hollow Radiance": "6664", "Unending Despair": "2502", 
        "Jak'Sho, The Protean": "6665", "Kaenic Rookern": "2504", "Spirit Visage": "3065", 
        "Force of Nature": "4401", "Frozen Heart": "3110", "Randuin's Omen": "3143", 
        "Dead Man's Plate": "3742", "Black Cleaver": "3071", "Trinity Force": "3078", 
        "Stridebreaker": "6631", "Titanic Hydra": "3748", "Ravenous Hydra": "3074", 
        "Spear of Shojin": "3161", "Sundered Sky": "6610", "Eclipse": "6692", 
        "Sterak's Gage": "3053", "Hullbreaker": "3181", "Experimental Hexplate": "3073", 
        "Death's Dance": "6333", "Maw of Malmortius": "3156", "Guardian Angel": "3026",
        "Ardent Censer": "3504", "Staff of Flowing Water": "6616", "Mikael's Blessing": "3222", 
        "Redemption": "3107", "Knight's Vow": "3109", "Vigilant Wardstone": "4643", 
        "Shurelya's Battlesong": "2065", "Trailblazer": "3002", "Imperial Mandate": "4005",
        "Echoes of Helia": "6620", "Moonstone Renewer": "6617", "Dawncore": "6621", "Zeke's Convergence": "3050"
    };

    const data = {
        champions: ["Aatrox", "Ahri", "Akali", "Akshan", "Alistar", "Ambessa", "Amumu", "Anivia", "Annie", "Aphelios", "Ashe", "Aurelion Sol", "Aurora", "Azir", "Bard", "Bel'Veth", "Blitzcrank", "Brand", "Braum", "Briar", "Caitlyn", "Camille", "Cassiopeia", "Cho'Gath", "Corki", "Darius", "Diana", "Dr. Mundo", "Draven", "Ekko", "Elise", "Evelynn", "Ezreal", "Fiddlesticks", "Fiora", "Fizz", "Galio", "Gangplank", "Garen", "Gnar", "Gragas", "Graves", "Gwen", "Hecarim", "Heimerdinger", "Hwei", "Illaoi", "Irelia", "Ivern", "Janna", "Jarvan IV", "Jax", "Jayce", "Jhin", "Jinx", "K'Sante", "Kai'Sa", "Kalista", "Karma", "Karthus", "Kassadin", "Katarina", "Kayle", "Kayn", "Kennen", "Kha'Zix", "Kindred", "Kled", "Kog'Maw", "LeBlanc", "Lee Sin", "Leona", "Lillia", "Lissandra", "Lucian", "Lulu", "Lux", "Malphite", "Malzahar", "Maokai", "Master Yi", "Mel", "Milio", "Miss Fortune", "Mordekaiser", "Morgana", "Naafiri", "Nami", "Nasus", "Nautilus", "Neeko", "Nidalee", "Nilah", "Nocturne", "Nunu & Willump", "Olaf", "Orianna", "Ornn", "Pantheon", "Poppy", "Pyke", "Qiyana", "Quinn", "Rakan", "Rammus", "Rek'Sai", "Rell", "Renata Glasc", "Renekton", "Rengar", "Riven", "Rumble", "Ryze", "Samira", "Sejuani", "Senna", "Seraphine", "Sett", "Shaco", "Shen", "Shyvana", "Singed", "Sion", "Sivir", "Skarner", "Smolder", "Sona", "Soraka", "Swain", "Sylas", "Syndra", "Tahm Kench", "Taliyah", "Talon", "Taric", "Teemo", "Thresh", "Tristana", "Trundle", "Tryndamere", "Twisted Fate", "Twitch", "Udyr", "Urgot", "Varus", "Vayne", "Veigar", "Vel'Koz", "Vex", "Vi", "Viego", "Viktor", "Vladimir", "Volibear", "Warwick", "Wukong", "Xayah", "Xerath", "Xin Zhao", "Yasuo", "Yone", "Yorick", "Yunara", "Yuumi", "Zaahen", "Zac", "Zed", "Zeri", "Ziggs", "Zilean", "Zoe", "Zyra"],
        items: ["Actualizer", "Bandlepipes", "Bastionbreaker", "Diadem of Songs", "Dusk and Dawn", "Endless Hunger", "Fiendhunter Bolts", "Hexoptics C44", "Protoplasm Harness", "Hextech Gunblade", "Stormrazor", "Overlord's Bloodmail", "Yun Tal Wildarrows", "Ardent Censer", "Staff of Flowing Water", "Mikael's Blessing", "Redemption", "Knight's Vow", "Zeke's Convergence", "Locket of the Iron Solari", "Imperial Mandate", "Echoes of Helia", "Moonstone Renewer", "Dawncore", "Vigilant Wardstone", "Shurelya's Battlesong", "Trailblazer", "Rabadon's Deathcap", "Zhonya's Hourglass", "Banshee's Veil", "Liandry's Torment", "Blackfire Torch", "Ludens Companion", "Archangel's Staff", "Malignance", "Shadowflame", "Stormsurge", "Cryptbloom", "Void Staff", "Nashor's Tooth", "Lich Bane", "Cosmic Drive", "Morellonomicon", "Rylai's Crystal Scepter", "Infinity Edge", "The Collector", "Lord Dominik's Regards", "Mortal Reminder", "Kraken Slayer", "Navori Flickerblade", "Phantom Dancer", "Statikk Shiv", "Rapid Firecannon", "Blade of the Ruined King", "Terminus", "Wit's End", "Guinsoo's Rageblade", "Immortal Shieldbow", "Bloodthirster", "Essence Reaver", "Youmuu's Ghostblade", "Hubris", "Opportunity", "Axiom Arc", "Edge of Night", "Serylda's Grudge", "Umbral Glaive", "Profane Hydra", "Voltaic Cyclosword", "Heartsteel", "Warmog's Armor", "Thornmail", "Sunfire Aegis", "Hollow Radiance", "Unending Despair", "Jak'Sho, The Protean", "Kaenic Rookern", "Spirit Visage", "Force of Nature", "Frozen Heart", "Randuin's Omen", "Dead Man's Plate", "Black Cleaver", "Trinity Force", "Stridebreaker", "Titanic Hydra", "Ravenous Hydra", "Spear of Shojin", "Sundered Sky", "Eclipse", "Sterak's Gage", "Hullbreaker", "Experimental Hexplate", "Death's Dance", "Maw of Malmortius", "Guardian Angel"],
        boots: ["Berserker's Greaves", "Ionian Boots of Lucidity", "Mercury's Treads", "Plated Steelcaps", "Sorcerer's Shoes", "Swiftness Boots", "Symbiotic Soles"],
        starters: ["Doran's Blade", "Doran's Ring", "Doran's Shield", "Dark Seal", "Cull", "Tear of the Goddess"],
        jgStarters: ["Gustwalker Hatchling", "Mosstomper Seedling", "Scorchclaw Pup"],
        suppFinals: ["Celestial Opposition", "Dream Maker", "Zaz'Zak's Realmspike", "Bloodsong", "Sleigh of Hand"],
        summs: ["SummonerFlash", "SummonerDot", "SummonerExhaust", "SummonerTeleport", "SummonerHaste", "SummonerHeal", "SummonerBarrier", "SummonerBoost", "SummonerSmite"],
        runes: {
            "Precision": { keystones: ["Press the Attack", "Fleet Footwork", "Conqueror"], row1: ["Absorb Life", "Triumph", "Presence of Mind"], row2: ["Alacrity", "Tenacity", "Bloodline"], row3: ["Coup de Grace", "Cut Down", "Last Stand"] },
            "Domination": { keystones: ["Electrocute", "Dark Harvest", "Hail of Blades"], row1: ["Cheap Shot", "Taste of Blood", "Sudden Impact"], row2: ["Zombie Ward", "Ghost Poro", "Eyeball Collection"], row3: ["Treasure Hunter", "Ingenious Hunter", "Relentless Hunter", "Ultimate Hunter"] },
            "Sorcery": { keystones: ["Summon Aery", "Arcane Comet", "Phase Rush"], row1: ["Nullifying Orb", "Manaflow Band", "Nimbus Clock"], row2: ["Transcendence", "Celerity", "Absolute Focus"], row3: ["Scorch", "Waterwalking", "Gathering Storm"] },
            "Resolve": { keystones: ["Grasp of the Undying", "Aftershock", "Guardian"], row1: ["Demolish", "Font of Life", "Shield Bash"], row2: ["Conditioning", "Second Wind", "Bone Plating"], row3: ["Overgrowth", "Revitalize", "Unflinching"] },
            "Inspiration": { keystones: ["Glacial Augment", "Unsealed Spellbook", "First Strike"], row1: ["Hextech Flashtraption", "Magical Footwear", "Cash Back"], row2: ["Triple Tonic", "Time Warp Tonic", "Biscuit Delivery"], row3: ["Cosmic Insight", "Approach Velocity", "Jack of All Trades"] }
        },
        stats: [
            ["Adaptive Force", "Attack Speed", "Ability Haste"], 
            ["Adaptive Force", "Move Speed", "Scaling Health"], 
            ["Flat Health", "Tenacity & Slow Resist", "Scaling Health"] 
        ]
    };

    function getRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    // Logic to fetch images from Riot Data Dragon
    function getChampImg(name) {
        let cleanName = name.replace(/[^a-zA-Z0-9]/g, ""); 
        if (name === "Wukong") cleanName = "MonkeyKing";
        if (name === "Nunu & Willump") cleanName = "Nunu";
        return `https://ddragon.leagueoflegends.com/cdn/${VERSION}/img/champion/${cleanName}.png`;
    }

    function getSummImg(name) {
        return `https://ddragon.leagueoflegends.com/cdn/${VERSION}/img/spell/${name}.png`;
    }

    function getItemImg(name) {
        const id = itemToId[name] || "1001"; // Fallback to boots if name not in mapping
        return `https://ddragon.leagueoflegends.com/cdn/${VERSION}/img/item/${id}.png`;
    }

    function generate(role) {
        document.getElementById('results').style.display = 'grid'; 
        
        // Champion Generation
        const champ = getRandom(data.champions);
        document.getElementById('res-champ').innerText = champ;
        document.getElementById('img-champ').src = getChampImg(champ);

// Summoner Spells Generation
        let s1, s2;
        
        if (role === 'JG') {
            // Jungle ALWAYS gets Smite + one other random spell
            s1 = "SummonerSmite";
            s2 = getRandom(data.summs.filter(s => s !== "SummonerSmite"));
        } else {
            // Everyone else gets two random spells, but SMITE is removed from the list
            const noSmitePool = data.summs.filter(s => s !== "SummonerSmite");
            s1 = getRandom(noSmitePool);
            s2 = getRandom(noSmitePool.filter(s => s !== s1));
        }

        document.getElementById('res-summs').innerHTML = `
            <img class="icon-inline" src="${getSummImg(s1)}" title="${s1}">
            <img class="icon-inline" src="${getSummImg(s2)}" title="${s2}">
        `;

        // Runes Generation
        const trees = Object.keys(data.runes);
        const pKey = getRandom(trees);
        const sKey = getRandom(trees.filter(t => t !== pKey));
        const pTree = data.runes[pKey];
        const sTree = data.runes[sKey];
        const secondaryRows = [sTree.row1, sTree.row2, sTree.row3].sort(() => 0.5 - Math.random()).slice(0, 2);

        document.getElementById('res-runes').innerHTML = `
            <div class="${pKey}" style="font-weight:bold;">✦ ${getRandom(pTree.keystones)} - ${pKey} (Primary)</div>
            <div class="minor-runes">● ${getRandom(pTree.row1)} | ● ${getRandom(pTree.row2)} | ● ${getRandom(pTree.row3)}</div>
            <div class="${sKey}" style="margin-top:5px; font-weight:bold;">${sKey} (Secondary)</div>
            <div class="minor-runes">● ${getRandom(secondaryRows[0])} | ● ${getRandom(secondaryRows[1])}</div>
            <div class="stat-nodes">Shards: ${data.stats.map(row => getRandom(row)).join(' / ')}</div>
        `;

        // Items Build Logic
        let build = [];
        let pool = [...data.items];

        // Starter Item
        if (role === 'JG') build.push(getRandom(data.jgStarters));
        else if (role === 'SUPP') build.push("World Atlas");
        else build.push(getRandom(data.starters));

        // Build path
        if (role === 'SUPP') {
            build.push(getRandom(data.suppFinals));
            let core = getRandom(pool); build.push(core); pool = pool.filter(i => i !== core);
            build.push(getRandom(data.boots));
            for(let i=0; i<3; i++) {
                let item = getRandom(pool); build.push(item); pool = pool.filter(it => it !== item);
            }
        } else {
            let first = getRandom(pool); build.push(first); pool = pool.filter(i => i !== first);
            build.push(getRandom(data.boots));
            let count = (role === 'ADC') ? 5 : 4;
            for(let i=0; i<count; i++) {
                let item = getRandom(pool); build.push(item); pool = pool.filter(it => it !== item);
            }
        }

        // Render Items List with Icons
        document.getElementById('res-items').innerHTML = build.map((item, index) => `
            <li>
                <span style="width: 25px; display: inline-block; opacity: 0.5;">${index}.</span>
                <img class="icon-inline" src="${getItemImg(item)}"> 
                ${item}
            </li>
        `).join('');
    }
</script>
</body>
</html>
