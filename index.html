<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Bravery - 2026 Edition</title>
    <style>
        :root {
            --precision: #c8aa6e; --domination: #d0021b; --sorcery: #6c75ff;
            --resolve: #a1d586; --inspiration: #48b4be; --background: #010a13;
            --card-bg: #091428; --text: #f0e6d2; --gold: #c89b3c;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--background); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .container { width: 100%; max-width: 1200px; background: var(--card-bg); border: 2px solid var(--gold); padding: 25px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); display: grid; grid-template-columns: 1fr; gap: 10px; }
        
        h1 { text-align: center; color: var(--gold); margin-top: 0; text-transform: uppercase; letter-spacing: 2px; grid-column: 1 / -1;}
        
        .role-selector { display: flex; justify-content: center; margin-bottom: 25px; gap: 15px; grid-column: 1 / -1; }
        .role-btn { padding: 12px 25px; background: #1e2328; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; transition: all 0.2s ease; font-weight: bold; font-size: 0.9rem; text-transform: uppercase; }
        .role-btn:hover { background: var(--gold); color: var(--background); }
        
        .result-section { display: none; grid-column: 1 / -1; border-top: 1px solid #3c3c41; padding-top: 25px; grid-template-columns: 1fr 1fr 1fr; gap: 30px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .left-column { grid-column: 1; text-align: left; }
        .middle-column { grid-column: 2; text-align: left; border-left: 1px solid #1e2328; border-right: 1px solid #1e2328; padding: 0 20px; }
        .right-column { grid-column: 3; text-align: left; }
        
        .result-item { margin-bottom: 20px; }
        .label { font-size: 0.75rem; font-weight: bold; color: var(--gold); display: block; margin-bottom: 5px; text-transform: uppercase; opacity: 0.8; }
        
        .icon-inline { width: 24px; height: 24px; vertical-align: middle; margin-right: 8px; border-radius: 4px; border: 1px solid rgba(200, 155, 60, 0.3); }
        
        /* Updated: Removed grayscale to restore color */
        .icon-rune { width: 20px; height: 20px; vertical-align: middle; margin-right: 10px; border-radius: 50%; }
        
        .icon-large { width: 64px; height: 64px; border: 2px solid var(--gold); border-radius: 4px; margin-right: 15px; float: left; }
        .champ-container { overflow: hidden; display: flex; align-items: center; }

        .skill-container { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .skill-box { text-align: center; }
        .skill-icon { width: 42px; height: 42px; border: 1px solid var(--gold); border-radius: 4px; display: block; margin-bottom: 4px; }
        .skill-letter { font-size: 0.7rem; color: var(--gold); font-weight: bold; }

        .Precision { color: var(--precision); } .Domination { color: var(--domination); } .Sorcery { color: var(--sorcery); } .Resolve { color: var(--resolve); } .Inspiration { color: var(--inspiration); }
        .build-list { list-style: none; padding: 0; margin: 0; }
        .build-list li { padding: 7px 0; border-bottom: 1px solid #1e2328; font-size: 0.95rem; display: flex; align-items: center; }
        
        .minor-runes { font-size: 0.85rem; color: #fff; margin-bottom: 8px; display: flex; align-items: center; }
        .stat-nodes { font-size: 0.85rem; color: #a0a0a0; margin-top: 12px; }
        .shard-label { font-weight: bold; color: #a0a0a0; display: block; margin-bottom: 10px; border-top: 1px solid #1e2328; padding-top: 10px; }
    </style>
</head>

            </div>

            <div class="minor-runes-container" style="display:flex; flex-direction:column; gap:5px; margin-bottom:15px; margin-left: 20px;">
                <div class="minor-runes"><img src="${runeBase}${pKey}/${pRow1.i}/${pRow1.i}.png" class="icon-rune"> ${pRow1.n}</div>
                <div class="minor-runes"><img src="${runeBase}${pKey}/${pRow2.i}/${pRow2.i}.png" class="icon-rune"> ${pRow2.n}</div>
                <div class="minor-runes"><img src="${runeBase}${pKey}/${pRow3.i}/${pRow3.i}.png" class="icon-rune"> ${pRow3.n}</div>
            </div>

            <div class="${sKey}" style="font-weight:bold; display:flex; align-items:center; gap:8px; margin-bottom:10px; margin-top:20px;">
                <img src="${runeBase}${sTree.icon}.png" style="width:20px; filter:brightness(1.5);"> 
                ${sKey} (Secondary)
            </div>
            <div class="minor-runes-container" style="display:flex; flex-direction:column; gap:5px; margin-left: 20px;">
                <div class="minor-runes"><img src="${runeBase}${sKey}/${sRune1.i}/${sRune1.i}.png" class="icon-rune"> ${sRune1.n}</div>
                <div class="minor-runes"><img src="${runeBase}${sKey}/${sRune2.i}/${sRune2.i}.png" class="icon-rune"> ${sRune2.n}</div>
            </div>

            <div class="stat-nodes">
                <span class="shard-label">Shards</span>
                <div class="minor-runes-container" style="display:flex; flex-direction:column; gap:5px;">
                    ${data.stats.map(row => {
                        const shard = getRandom(row);
                        return `<div class="minor-runes">
                            <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/StatMods/${shard.i}.png" style="width:16px; margin-right:10px; border-radius:50%;"> 
                            ${shard.n}
                        </div>`;
                    }).join('')}
                </div>
            </div>
        `;

        let build = [];
        let pool = [...data.items];
        if (role === 'JG') build.push(getRandom(data.jgStarters));
        else if (role === 'SUPP') build.push("World Atlas");
        else build.push(getRandom(data.starters));

        if (role === 'SUPP') {
            build.push(getRandom(data.suppFinals));
            let core = getRandom(pool); build.push(core); pool = pool.filter(i => i !== core);
            build.push(getRandom(data.boots));
            for(let i=0; i<3; i++) {
                let item = getRandom(pool); build.push(item); pool = pool.filter(it => it !== item);
            }
        } else {
            let first = getRandom(pool); build.push(first); pool = pool.filter(i => i !== first);
            build.push(getRandom(data.boots));
            let count = (role === 'ADC') ? 5 : 4;
            for(let i=0; i<count; i++) {
                let item = getRandom(pool); build.push(item); pool = pool.filter(it => it !== item);
            }
        }

        document.getElementById('res-items').innerHTML = build.map((item, index) => {
            const id = itemToId[item] || "1001";
            return `<li>
                <span style="width: 25px; display: inline-block; opacity: 0.5; font-size: 0.8rem;">${index}.</span>
                <img class="icon-inline" src="https://ddragon.leagueoflegends.com/cdn/${VERSION}/img/item/${id}.png"> 
                ${item}
            </li>`;
        }).join('');
    }
</script>
</body>
</html>
