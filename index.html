<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Bravery - 2026 Edition</title>
    <style>
        :root {
            --precision: #c8aa6e; --domination: #d0021b; --sorcery: #6c75ff;
            --resolve: #a1d586; --inspiration: #48b4be; --background: #010a13;
            --card-bg: #091428; --text: #f0e6d2; --gold: #c89b3c;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--background); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
        }
        
        .container { 
            position: relative; 
            width: 100%; 
            max-width: 1200px; 
            background: var(--card-bg); 
            border: 2px solid var(--gold); 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); 
            box-sizing: border-box;
        }
        
        /* REROLL BUTTON STYLE */
        .reroll-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 15px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            z-index: 10;
            transition: all 0.2s;
            opacity: 0.6;
        }
        .reroll-btn:hover { opacity: 1; background: rgba(200, 155, 60, 0.1); }

        h1 { text-align: center; color: var(--gold); margin-top: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .role-selector { display: flex; justify-content: center; margin-bottom: 25px; gap: 15px; flex-wrap: wrap; }
        
        .role-btn { padding: 12px 25px; background: #1e2328; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; transition: all 0.2s ease; font-weight: bold; font-size: 0.9rem; text-transform: uppercase; }
        .role-btn:hover { background: var(--gold); color: var(--background); }
        
        /* RESPONSIVE GRID SYSTEM */
        .result-section { 
            display: none; 
            border-top: 1px solid #3c3c41; 
            padding-top: 25px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            animation: fadeIn 0.4s ease; 
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .column { text-align: left; }
        
        /* COLUMN BORDERS FOR DESKTOP ONLY */
        @media (min-width: 992px) {
            .result-section { grid-template-columns: 1fr 1fr 1fr; }
            .middle-border { border-left: 1px solid #1e2328; border-right: 1px solid #1e2328; padding: 0 20px; }
        }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 600px) {
            .reroll-btn { position: relative; top: 0; left: 0; width: 100%; margin-bottom: 15px; }
            .role-btn { flex: 1 1 40%; font-size: 0.8rem; padding: 10px; }
            .icon-large { width: 48px; height: 48px; }
            #res-champ { font-size: 1.2rem !important; }
        }
        
        .result-item { margin-bottom: 20px; }
        .label { font-size: 0.75rem; font-weight: bold; color: var(--gold); display: block; margin-bottom: 5px; text-transform: uppercase; opacity: 0.8; }
        
        .icon-inline { width: 24px; height: 24px; vertical-align: middle; margin-right: 8px; border-radius: 4px; border: 1px solid rgba(200, 155, 60, 0.3); }
        .icon-rune { width: 22px; height: 22px; vertical-align: middle; margin-right: 10px; border-radius: 50%; }
        
        .icon-large { width: 64px; height: 64px; border: 2px solid var(--gold); border-radius: 4px; margin-right: 15px; float: left; }
        .champ-container { overflow: hidden; display: flex; align-items: center; }

        .skill-container { display: flex; align-items: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .skill-box { text-align: center; }
        .skill-icon { width: 42px; height: 42px; border: 1px solid var(--gold); border-radius: 4px; display: block; margin-bottom: 4px; }
        .skill-letter { font-size: 0.7rem; color: var(--gold); font-weight: bold; }

        #loading-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(1, 10, 19, 0.9); z-index: 1000; justify-content: center; 
            align-items: center; color: var(--gold); font-size: 2rem; font-weight: bold; 
            text-transform: uppercase; letter-spacing: 5px; flex-direction: column; 
        }

        #loading-screen::after {
            content: ""; width: 40px; height: 40px; margin-top: 20px;
            border: 4px solid #1e2328; border-top: 4px solid var(--gold);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .Precision { color: var(--precision); } .Domination { color: var(--domination); } .Sorcery { color: var(--sorcery); } .Resolve { color: var(--resolve); } .Inspiration { color: var(--inspiration); }
        .build-list { list-style: none; padding: 0; margin: 0; }
        .build-list li { padding: 7px 0; border-bottom: 1px solid #1e2328; font-size: 0.95rem; display: flex; align-items: center; }
        
        .minor-runes { font-size: 0.85rem; color: #fff; margin-bottom: 8px; display: flex; align-items: center; }
        .stat-nodes { font-size: 0.85rem; color: #a0a0a0; margin-top: 12px; }
        .shard-label { font-weight: bold; color: #a0a0a0; display: block; margin-bottom: 10px; border-top: 1px solid #1e2328; padding-top: 10px; }
    </style>
</head>
<body>

<div id="loading-screen">Loading...</div>

<div class="container">
    <button class="reroll-btn" onclick="reroll()">↻ Reroll</button>

    <h1>Ultimate Bravery</h1>
    <div class="role-selector">
        <button class="role-btn" onclick="generate('TOP')">TOP</button>
        <button class="role-btn" onclick="generate('JG')">JG</button>
        <button class="role-btn" onclick="generate('MID')">MID</button>
        <button class="role-btn" onclick="generate('ADC')">ADC</button>
        <button class="role-btn" onclick="generate('SUPP')">SUPP</button>
    </div>

    <div id="results" class="result-section" style="display: none;">
        <div class="column">
            <div class="result-item">
                <span class="label">Champion</span>
                <div class="champ-container">
                    <img id="img-champ" class="icon-large" src="" alt="">
                    <span id="res-champ" style="font-size: 1.5rem; font-weight: bold; color: #fff;"></span>
                </div>
            </div>
            <div class="result-item">
                <span class="label">Summoner Spells</span>
                <div id="res-summs" style="display: flex; gap: 10px; align-items: center;"></div>
            </div>
            <div class="result-item">
                <span class="label">Skill Priority</span>
                <div id="res-skills" class="skill-container"></div>
            </div>
        </div>

        <div class="column middle-border">
            <div class="result-item">
                <span class="label">Rune Page</span>
                <div id="res-runes"></div>
            </div>
        </div>

        <div class="column">
            <div class="result-item">
                <span class="label">Item Build</span>
                <ul id="res-items" class="build-list"></ul>
            </div>
        </div>
    </div>
</div>

        } catch (e) {
            console.error("Failed to load runes", e);
        }
    }

    function reroll() {
        if (lastSelectedRole) generate(lastSelectedRole);
        else alert("Pick a role first!");
    }

        lastSelectedRole = role;
        const loader = document.getElementById('loading-screen');
        loader.style.display = 'flex';

        setTimeout(async () => {
            if (runeData.length === 0) await loadRunes();

            const champ = getRandom(data.champions);
            const champId = getChampId(champ);
            let skillIcons = [{key:'Q', img:''}, {key:'W', img:''}, {key:'E', img:''}]; 
            
            try {
                const resp = await fetch(`https://ddragon.leagueoflegends.com/cdn/${VERSION}/data/en_US/champion/${champId}.json`);

                const spells = json.data[champId].spells;
                skillIcons = [
                    { key: 'Q', img: spells[0].image.full },
                    { key: 'W', img: spells[1].image.full },
                    { key: 'E', img: spells[2].image.full }
                ];

            }

                    <img class="skill-icon" src="https://ddragon.leagueoflegends.com/cdn/${VERSION}/img/spell/${s.img}">

                <div class="minor-runes" style="margin-left: 20px; font-weight: bold; color: #fff;">

                            const shard = getRandom(row);
                            return `<div class="minor-runes">
                                <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/StatMods/${shard.i}.png" style="width:18px; margin-right:10px; border-radius:50%;"> ${shard.n}
                            </div>`;
                        }).join('')}
                    </div>
                </div>
            `;

            let build = [];
            let pool = [...data.items];

            // Item generation logic
            if (role === 'JG') build.push(getRandom(data.jgStarters));
            else if (role === 'SUPP') build.push("World Atlas");
            else build.push(getRandom(data.starters));

            build.push(getRandom(data.boots));

            if (role === 'SUPP') build.push(getRandom(data.suppFinals));
            
            // Standardizing build length: ADC gets 6 items, Support 4 extra, others 5 extra
            let extraItems = (role === 'SUPP') ? 4 : (role === 'ADC' ? 6 : 5);
            for(let i = 0; i < extraItems; i++) {
                if(pool.length === 0) break;
                let item = getRandom(pool);
                build.push(item);
                pool = pool.filter(it => it !== item);
            }

            document.getElementById('res-items').innerHTML = build.map((item, index) => {
                const id = itemToId[item] || "1001";
                return `<li>
                    <span style="width: 25px; display: inline-block; opacity: 0.5; font-size: 0.8rem;">${index + 1}.</span>
                    <img class="icon-inline" src="https://ddragon.leagueoflegends.com/cdn/${VERSION}/img/item/${id}.png"> 
                    ${item}
                </li>`;
            }).join('');

            loader.style.display = 'none';
            window.scrollTo({ top: document.getElementById('results').offsetTop - 20, behavior: 'smooth' });
        }, 75); 
    }

    loadRunes();
</script>
</body>
</html>
